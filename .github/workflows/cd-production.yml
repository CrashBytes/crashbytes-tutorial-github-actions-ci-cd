name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true

env:
  PRODUCTION_URL: https://example.com

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run full test suite
        run: npm test
      
      - name: Security audit
        run: npm audit --audit-level=high || true
      
      - name: Build verification
        run: npm run build

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Create deployment record
        id: deployment
        run: |
          echo "version=${{ github.event.release.tag_name || github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Deploy to production
        run: |
          echo "Deploying version ${{ steps.deployment.outputs.version }}..."
          echo "Add your production deployment commands here"
      
      - name: Create deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.deployment.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${{ steps.deployment.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ env.PRODUCTION_URL }}" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Post-deployment Notifications
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    
    steps:
      - name: Send success notification
        if: needs.deploy-production.result == 'success'
        run: echo "✅ Production deployment completed successfully!"
      
      - name: Send failure notification
        if: needs.deploy-production.result == 'failure'
        run: echo "❌ Production deployment failed!"
